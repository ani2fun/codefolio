name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: sbt build + tests + frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt
        uses: actions/cache@v5
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            ~/.ivy2/cache
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/**') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package.json

      - name: Compile + test (Scala)
        run: sbt "compile; test"

      - name: Stage server + link client JS
        run: sbt "server/Universal/stage; client/fullLinkJS"

      - name: Install npm deps
        working-directory: client
        run: npm install --no-audit --no-fund

      - name: Build frontend bundle
        working-directory: client
        run: npm run build

  docker:
    name: docker build smoke
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t codefolio:ci .
