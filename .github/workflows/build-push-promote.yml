name: Build, Push, and Promote Codefolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: codefolio-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/ani2fun/codefolio
  INFRA_REPO: ani2fun/infra
  INFRA_KUSTOMIZATION_FILE: deploy/apps/codefolio/overlays/prod/kustomization.yaml

jobs:
  build-push-promote:
    name: Build image and update infra repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag ${{ env.IMAGE_REPO }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_REPO }}:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Update production image tag in infra repo
        env:
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          IMAGE_TAG: ${{ github.sha }}
          KUSTOMIZATION_PATH: infra/${{ env.INFRA_KUSTOMIZATION_FILE }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          import yaml

          path = Path(os.environ["KUSTOMIZATION_PATH"])
          data = yaml.safe_load(path.read_text())
          image_repo = os.environ["IMAGE_REPO"]
          accepted_names = {
              image_repo,
              image_repo.removeprefix("ghcr.io/"),
          }

          images = data.setdefault("images", [])
          found = False

          for image in images:
              if image.get("name") in accepted_names:
                  image["name"] = image_repo
                  image["newName"] = image_repo
                  image["newTag"] = os.environ["IMAGE_TAG"]
                  found = True
                  break

          if not found:
              images.append({
                  "name": image_repo,
                  "newName": image_repo,
                  "newTag": os.environ["IMAGE_TAG"],
              })

          path.write_text(yaml.safe_dump(data, sort_keys=False))
          PY

      - name: Configure Git identity
        run: |
          git -C infra config user.name "${{ secrets.INFRA_GIT_USER_NAME }}"
          git -C infra config user.email "${{ secrets.INFRA_GIT_USER_EMAIL }}"

      - name: Commit and push infra change
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          git -C infra pull --rebase --autostash origin main

          git -C infra add "${{ env.INFRA_KUSTOMIZATION_FILE }}"

          if git -C infra diff --cached --quiet; then
            echo "No infra changes to commit."
            exit 0
          fi

          git -C infra commit -m "chore(codefolio): promote image to ${IMAGE_TAG}"
          git -C infra push origin HEAD:main
