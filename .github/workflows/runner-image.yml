name: Build and Push Code Runner Image

# Publishes the Visualise "Code Runner" backend (runner/) — a small Node server
# that compiles + runs submitted snippets behind a Judge0-style /submissions API.
# The homelab K8s (infra repo, deploy/apps/codefolio) pulls this image; the app
# prefers Code Runner over Piston whenever CODE_RUNNER_URL is set, because it has
# a 1 MB stdout cap (vs Piston's 64 KB) and a controlled JDK with jdk.compiler —
# required for the JVM Visualise trace harness (see ADR-0022 + the NZEC note).
#
# Build + push only. The infra Deployment references :latest with imagePullPolicy
# Always; switch to SHA-pinned promotion (like _build-push-promote.yml does for
# the app) later if you want immutable GitOps deploys of the runner.

on:
  push:
    branches: [main]
    paths:
      - "runner/**"
      - ".github/workflows/runner-image.yml"
  workflow_dispatch:

concurrency:
  group: codefolio-runner-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build + push code-runner image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file runner/Dockerfile \
            --push \
            --tag ghcr.io/ani2fun/codefolio-runner:${{ github.sha }} \
            --tag ghcr.io/ani2fun/codefolio-runner:latest \
            --cache-from type=gha,scope=codefolio-runner \
            --cache-to type=gha,mode=max,scope=codefolio-runner \
            runner
