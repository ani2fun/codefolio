services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: codefolio
      POSTGRES_PASSWORD: codefolio
      POSTGRES_DB: codefolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codefolio -d codefolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
    environment:
      DB_URL:      jdbc:postgresql://db:5432/codefolio
      DB_USER:     codefolio
      DB_PASSWORD: codefolio
      REDIS_URL:   redis://redis:6379
      MONGO_URI:   mongodb://mongo:27017
      MONGO_DB:    codefolio
      STATIC_DIR:  /app/static
      PORT:        "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
  mongodata:
