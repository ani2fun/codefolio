# Static portfolio — a single app container, no backing stores (no Postgres / Redis / Mongo / auth).
# `docker compose up --build` serves the production image on http://localhost:8080. For iterative local
# development use `./bin/dev` instead (sbt watcher + Vite with HMR).
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      STATIC_DIR: /app/static
      PORT: "8080"
