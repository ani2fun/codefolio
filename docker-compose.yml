services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: codefolio
      POSTGRES_PASSWORD: codefolio
      POSTGRES_DB: codefolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codefolio -d codefolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Lightweight ARM64-friendly code execution sandbox. Speaks the Judge0
  # submissions API (`POST /submissions/?base64_encoded=true&wait=true&...`)
  # so the same handler talks to both this and a hosted Piston instance.
  # No process-level sandboxing — local development only.
  code-runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:2358:2358"

  app:
    build: .
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
      code-runner: { condition: service_started }
    environment:
      DB_URL:      jdbc:postgresql://db:5432/codefolio
      DB_USER:     codefolio
      DB_PASSWORD: codefolio
      REDIS_URL:   redis://redis:6379
      MONGO_URI:   mongodb://mongo:27017
      MONGO_DB:    codefolio
      STATIC_DIR:  /app/static
      PORT:        "8080"
      # Local dev defaults to the code-runner container; override PISTON_URL
      # in production to a self-hosted Piston (`/api/v2/execute` shape).
      PISTON_URL:              ${PISTON_URL:-}
      CODE_RUNNER_URL:         ${CODE_RUNNER_URL:-http://code-runner:2358}
      CODE_RUNNER_AUTHN_TOKEN: ${CODE_RUNNER_AUTHN_TOKEN:-}
    ports:
      - "8080:8080"

volumes:
  pgdata:
  mongodata:
