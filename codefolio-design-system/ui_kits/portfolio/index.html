<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <title>Portfolio · UI kit</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="BrandIcons.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Experience.jsx"></script>
  <script type="text/babel" src="Projects.jsx"></script>
  <script type="text/babel" src="Certifications.jsx"></script>
  <script type="text/babel" src="CortexTeaser.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const App = () => {
      const [active, setActive] = React.useState("hero");
      const [dark, setDark] = React.useState(false);
      React.useEffect(() => {
        document.documentElement.className = dark ? "dark" : "light";
      }, [dark]);
      const onNav = (id) => {
        setActive(id);
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };
      return (
        <div className="pf-page">
          <window.PortfolioHeader active={active} onNav={onNav} dark={dark} onToggleDark={() => setDark(d => !d)} />
          <window.PortfolioHero onNav={onNav} />
          <window.PortfolioAbout />
          <window.PortfolioExperience />
          <window.PortfolioProjects />
          <window.PortfolioCertifications />
          <window.PortfolioCortexTeaser />
          <window.PortfolioFooter />
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
