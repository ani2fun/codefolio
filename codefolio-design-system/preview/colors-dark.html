<!DOCTYPE html>
<html lang="en" class="dark"><head>
<meta charset="UTF-8"><title>Dark palette</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:#110f0d;color:#ece2d0;font-family:var(--font-sans);padding:22px 26px;min-height:100vh}
.row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap}
.sw{flex:1 1 0;min-width:120px;border-radius:12px;border:1px solid #2e2a26;padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:108px}
.sw .name{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#a59b8c}
.sw .hex{font-family:var(--font-mono);font-size:13px;margin-top:6px}
.sw .role{font-family:var(--font-mono);font-size:10px;color:#a59b8c;margin-top:auto}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#110f0d"><div><div class="name">background</div><div class="hex">#110f0d</div></div><div class="role">dark roast page bg</div></div>
  <div class="sw" style="background:#1a1715"><div><div class="name">card</div><div class="hex">#1a1715</div></div><div class="role">elevated card surface</div></div>
  <div class="sw" style="background:#25211f"><div><div class="name">secondary</div><div class="hex">#25211f</div></div><div class="role">warm band</div></div>
  <div class="sw" style="background:#db7e54;color:#110f0d"><div><div class="name" style="color:rgba(17,15,13,.6)">primary</div><div class="hex">#db7e54</div></div><div class="role" style="color:rgba(17,15,13,.7)">brighter terracotta</div></div>
  <div class="sw" style="background:#ece2d0;color:#110f0d"><div><div class="name" style="color:rgba(17,15,13,.6)">foreground</div><div class="hex">#ece2d0</div></div><div class="role" style="color:rgba(17,15,13,.7)">warm cream ink</div></div>
  <div class="sw" style="background:#2e2a26"><div><div class="name">border</div><div class="hex">#2e2a26</div></div><div class="role">hairline rules</div></div>
</div>
</body></html>
