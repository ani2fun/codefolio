<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Radii & shadows</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400;500&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:#f7f3ec;color:#292421;font-family:"Geist",sans-serif;padding:22px 26px;min-height:100vh}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.tile{background:#fbf9f3;border:1px solid #dcd4c5;padding:14px;height:108px;display:flex;flex-direction:column;justify-content:space-between}
.tile .lbl{font-family:"Geist Mono",monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#696057}
.tile .val{font-family:"Geist Mono",monospace;font-size:11.5px;color:#292421}
.r-sm{border-radius:10px}
.r-md{border-radius:12px}
.r-lg{border-radius:14px}
.r-pill{border-radius:9999px;height:56px;align-self:center;width:100%}
.shadow-1{box-shadow:0 1px 0 rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04)}
.shadow-lift{box-shadow:0 1px 0 rgba(0,0,0,.05),0 8px 24px -12px rgba(0,0,0,.18)}
</style></head><body>
<div class="grid">
  <div class="tile r-sm"><div class="lbl">--r-sm</div><div class="val">10px · chips</div></div>
  <div class="tile r-md"><div class="lbl">--r-md</div><div class="val">12px · buttons, inputs</div></div>
  <div class="tile r-lg"><div class="lbl">--r-lg</div><div class="val">14px · cards (base)</div></div>
  <div class="tile r-pill"><div class="lbl">--r-pill</div><div class="val">9999px · CTAs, tags</div></div>
  <div class="tile r-md shadow-1"><div class="lbl">--shadow-1</div><div class="val">resting · 1px ledge</div></div>
  <div class="tile r-md shadow-lift"><div class="lbl">--shadow-lift</div><div class="val">hover · 8 24 -12</div></div>
  <div class="tile r-md" style="border:1px solid rgba(200,105,62,.5)"><div class="lbl">hover border</div><div class="val">primary / 50</div></div>
  <div class="tile r-md" style="background:rgba(200,105,62,.06);border-color:rgba(200,105,62,.4)"><div class="lbl">primary tint</div><div class="val">.06 fill · .4 border</div></div>
</div>
</body></html>
