<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Hero stat strip</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500&family=Geist+Mono:wght@400;500&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:#f7f3ec;color:#292421;font-family:"Geist",sans-serif;padding:26px 30px;min-height:100vh}
.strip{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid #dcd4c5;border-bottom:1px solid #dcd4c5}
.cell{padding:18px 22px;border-right:1px solid #dcd4c5}
.cell:first-child{padding-left:0}
.cell:last-child{padding-right:0;border-right:0}
.num{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;font-size:40px;line-height:1;letter-spacing:-.02em;color:#292421}
.sup{font-family:"Instrument Serif",serif;font-style:italic;font-size:18px;color:#696057;vertical-align:top;margin-left:4px}
.label{margin-top:8px;font-family:"Geist Mono",monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#696057}
</style></head><body>
<div class="strip">
  <div class="cell"><div class="num">10<span class="sup">yrs</span></div><div class="label">on production systems</div></div>
  <div class="cell"><div class="num">4<span class="sup">sectors</span></div><div class="label">mobility · automotive · media · logistics</div></div>
  <div class="cell"><div class="num">€M</div><div class="label">pilot → funded programme</div></div>
  <div class="cell"><div class="num">6<span class="sup">companies</span></div><div class="label">Europcar · Audi · Disney · Dassault · UPS · Bell-Labs</div></div>
</div>
</body></html>
