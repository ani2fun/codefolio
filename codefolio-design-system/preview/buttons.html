<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Buttons & CTAs</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:#f7f3ec;color:#292421;font-family:"Geist",sans-serif;padding:22px 26px;min-height:100vh}
.stack{display:flex;flex-direction:column;gap:14px}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.lbl{font-family:"Geist Mono",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#696057}
.cta{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:9999px;font-size:13.5px;font-weight:500;text-decoration:none;transition:all .2s}
.primary{background:#292421;color:#f7f3ec}
.primary:hover{background:#c8693e}
.ghost{border:1px solid rgba(41,36,33,.3);color:#292421}
.ghost:hover{border-color:#292421}
.icon{width:14px;height:14px;display:inline-block}
.icon svg{display:block}
.tag-primary{display:inline-flex;align-items:center;font-family:"Geist Mono",monospace;font-size:11px;padding:5px 11px;border-radius:9999px;background:rgba(200,105,62,.12);border:1px solid rgba(200,105,62,.35);color:#292421}
.tag-mono{font-family:"Geist Mono",monospace;font-size:11px;color:#696057}
.filter{font-family:"Geist Mono",monospace;font-size:11px;letter-spacing:.10em;text-transform:uppercase;padding:6px 12px;border-radius:9999px;border:1px solid rgba(220,212,197,.7);color:#696057;background:transparent}
.filter.active{background:#292421;color:#f7f3ec;border-color:#292421}
</style></head><body>
<div class="stack">
  <div><div class="lbl" style="margin-bottom:6px">Primary CTA · hover</div>
    <div class="row">
      <a class="cta primary" href="#">Download CV <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg></span></a>
      <a class="cta ghost" href="#">See selected work <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-6-6l6 6-6 6"/></svg></span></a>
    </div>
  </div>
  <div><div class="lbl" style="margin-bottom:6px">Filter chips · active / idle</div>
    <div class="row">
      <button class="filter active">All</button>
      <button class="filter">Infra</button>
      <button class="filter">OSS</button>
      <button class="filter">Backend</button>
    </div>
  </div>
  <div><div class="lbl" style="margin-bottom:6px">Tag styles · primary-tinted / mono inline</div>
    <div class="row">
      <span class="tag-primary">Kotlin</span>
      <span class="tag-primary">Spring Boot</span>
      <span class="tag-primary">Keycloak</span>
      <span class="tag-mono">PostgreSQL</span>
      <span class="tag-mono">· Kafka</span>
      <span class="tag-mono">· AWS</span>
    </div>
  </div>
</div>
</body></html>
