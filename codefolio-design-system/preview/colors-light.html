<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Brand palette</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--c-bg);color:var(--c-fg);font-family:var(--font-sans);padding:22px 26px;min-height:100vh}
.row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap}
.sw{flex:1 1 0;min-width:120px;border-radius:12px;border:1px solid var(--c-border);padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:108px}
.sw .name{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--c-fg-muted)}
.sw .hex{font-family:var(--font-mono);font-size:13px;color:var(--c-fg);margin-top:6px}
.sw .role{font-family:var(--font-mono);font-size:10px;color:var(--c-fg-muted);margin-top:auto}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#f7f3ec"><div><div class="name">background</div><div class="hex">#f7f3ec</div></div><div class="role">page bg · warm off-white</div></div>
  <div class="sw" style="background:#fbf9f3"><div><div class="name">card</div><div class="hex">#fbf9f3</div></div><div class="role">cream card surface</div></div>
  <div class="sw" style="background:#e8e1d5"><div><div class="name">secondary</div><div class="hex">#e8e1d5</div></div><div class="role">warm band · Projects bg</div></div>
  <div class="sw" style="background:#c8693e;color:#fff"><div><div class="name" style="color:rgba(255,255,255,.7)">primary</div><div class="hex" style="color:#fff">#c8693e</div></div><div class="role" style="color:rgba(255,255,255,.8)">terracotta accent</div></div>
  <div class="sw" style="background:#292421;color:#f7f3ec"><div><div class="name" style="color:#a59b8c">foreground</div><div class="hex" style="color:#f7f3ec">#292421</div></div><div class="role" style="color:#a59b8c">dark roast ink</div></div>
  <div class="sw" style="background:#110f0d;color:#ece2d0"><div><div class="name" style="color:#a59b8c">roast</div><div class="hex" style="color:#ece2d0">#110f0d</div></div><div class="role" style="color:#a59b8c">dark-mode page bg</div></div>
</div>
</body></html>
