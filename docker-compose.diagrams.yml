# docker-compose.diagrams.yml
#
# Diagram-rendering pipeline for the System Design track in codefolio's
# Cortex content tree. Two-stage pipeline:
#   1. structurizr-cli  — DSL → PlantUML  (.dsl → .puml)
#   2. plantuml         — PlantUML → SVG  (.puml → .svg)
#
# Why a separate compose file? The codefolio app (docker-compose.yml at repo
# root) runs the ZIO server + Postgres + Redis + Mongo and has nothing to do
# with diagram rendering. This file exists only to render Structurizr
# workspaces into committed SVGs that Cortex embeds via <img> references.
#
# Usage from the repo root:
#   docker compose -f docker-compose.diagrams.yml --profile render run --rm diagrams
#
# Or, equivalently (and what `make diagrams` calls):
#   make diagrams
#
# Both paths are kept in sync. The compose path is friendlier on Windows /
# WSL where Make is sometimes missing; the Make path is faster on Linux/macOS
# because it short-circuits to local CLIs when they are installed.

services:

  # One-shot service: walks every *.dsl under content/cortex/system-design,
  # exports each to PlantUML/C4, then renders to SVG. Uses /bin/sh -c so we
  # can run two image-bound commands in sequence.
  diagrams:
    image: alpine:3.20
    profiles: ["render"]
    working_dir: /work
    volumes:
      - .:/work
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    # Mount the host docker socket so this container can spawn the
    # structurizr/cli and plantuml/plantuml containers itself.
    command: >
      /bin/sh -c '
        apk add --no-cache docker-cli >/dev/null;
        for dsl in $$(find content/cortex/system-design -name "*.dsl"); do
          dir=$$(dirname "$$dsl");
          name=$$(basename "$$dsl");
          echo "→ exporting $$dsl to PlantUML";
          docker run --rm -v "$$PWD/$$dir:/usr/local/structurizr" structurizr/cli \
              export -workspace "$$name" -format plantuml/c4plantuml -output . >/dev/null;
          echo "→ rendering $$dir/*.puml to SVG";
          docker run --rm -v "$$PWD/$$dir:/work" -w /work plantuml/plantuml \
              -tsvg "*.puml" >/dev/null;
        done;
        echo "✓ all diagrams rendered"
      '

  # Alternative: a one-shot `structurizr-cli` you can drive yourself, e.g.
  #   docker compose -f docker-compose.diagrams.yml run --rm structurizr \
  #     export -workspace content/cortex/system-design/.../workspace.dsl -format plantuml/c4plantuml -output .
  structurizr:
    image: structurizr/cli:latest
    profiles: ["tools"]
    working_dir: /usr/local/structurizr
    volumes:
      - .:/usr/local/structurizr

  # Alternative: a one-shot `plantuml` you can drive yourself, e.g.
  #   docker compose -f docker-compose.diagrams.yml run --rm plantuml \
  #     -tsvg content/cortex/system-design/.../*.puml
  plantuml:
    image: plantuml/plantuml:latest
    profiles: ["tools"]
    working_dir: /work
    volumes:
      - .:/work
