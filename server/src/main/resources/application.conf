codefolio {
  port = 8080
  port = ${?PORT}

  staticDir = "./client/dist"
  staticDir = ${?STATIC_DIR}

  db {
    url      = "jdbc:postgresql://localhost:5432/codefolio"
    url      = ${?DB_URL}
    user     = "codefolio"
    user     = ${?DB_USER}
    password = "codefolio"
    password = ${?DB_PASSWORD}
  }

  redis {
    url      = "redis://localhost:6379"
    url      = ${?REDIS_URL}
    # Cache TTL for the /api/hello payload, in seconds.
    ttlSecs  = 10
    ttlSecs  = ${?REDIS_TTL_SECS}
  }

  mongo {
    uri      = "mongodb://localhost:27017"
    uri      = ${?MONGO_URI}
    database = "codefolio"
    database = ${?MONGO_DB}
  }

  runner {
    # Piston public API (production): https://emkc.org/api/v2/piston works.
    pistonUrl       = ${?PISTON_URL}
    # Local Code Runner container (dev). Speaks Judge0 submissions API.
    codeRunnerUrl   = ${?CODE_RUNNER_URL}
    # Optional X-Auth-Token header for the local runner.
    codeRunnerAuthToken = ${?CODE_RUNNER_AUTHN_TOKEN}
  }

  cortex {
    # On-disk path to the content tree. Structure is convention-driven:
    # each subdirectory is a book; nested dirs become sections; .md files
    # are chapters. See CortexHandler for the full ruleset.
    root = "./content/cortex"
    root = ${?CORTEX_ROOT}

    # When true, mtime-check the content tree on every index request and
    # rebuild the cache if anything changed. Default true for dev DX; set
    # CORTEX_AUTO_RELOAD=false in prod where content is baked into the image.
    autoReload = true
    autoReload = ${?CORTEX_AUTO_RELOAD}
  }

  blog {
    # On-disk path to the blog post tree. Each *.md file is one post; the
    # slug is the filename without `.md`. Frontmatter carries title,
    # publishedAt, summary, tags, readMinutes, eyebrow, meta.
    root = "./content/blogs"
    root = ${?BLOG_ROOT}

    # Same mtime auto-reload behaviour as cortex. Disable in prod with
    # BLOG_AUTO_RELOAD=false.
    autoReload = true
    autoReload = ${?BLOG_AUTO_RELOAD}
  }
}
