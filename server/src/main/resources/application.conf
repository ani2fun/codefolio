codefolio {
  # HTTP listen port.
  port = 8080
  port = ${?PORT}

  # On-disk path to the Vite-built SPA bundle the server serves in production. In dev the bundle is absent
  # and Vite serves the UI on :5173, so the static routes mount nothing (see StaticRoutes).
  staticDir = "./client/dist"
  staticDir = ${?STATIC_DIR}
}
